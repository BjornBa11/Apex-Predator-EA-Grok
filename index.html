<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex Predator EA — Neural Core v1.0</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">APEX<span>PREDATOR</span></div>
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">NEURAL CORE — LIVE</div>
    <div style="color:var(--muted);font-size:11px;margin-left:8px" id="scanCount">Scans: 0</div>
  </div>
  <div style="display:flex;align-items:center;gap:18px">
    <div style="text-align:right">
      <div style="font-size:10px;color:var(--muted)">EQUITY</div>
      <div id="equityVal" style="font-weight:700;color:var(--buy);font-size:15px">$12,480.50</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:10px;color:var(--muted)">DAILY P&L</div>
      <div id="dailyPnl" style="font-weight:700;font-size:15px;color:var(--buy)">+$284.30</div>
    </div>
    <div class="clock" id="clockEl">--:--:--</div>
  </div>
</div>

<div class="main">

  <!-- LEFT COLUMN -->
  <div class="col">

    <!-- Apex Neural Signal -->
    <div class="card">
      <div class="card-title">Apex Neural Signal</div>
      <div id="signalBox" class="signal-box BUY">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="signal-label" id="signalLabel">BUY</div>
          <div style="text-align:right">
            <div id="sigCountBig" style="font-size:22px;font-weight:800;color:var(--buy)">7/9</div>
          </div>
        </div>
        <div class="signal-pair" id="signalPair">XAU/USD · 2s cycle</div>
        <div class="confidence">Neural Confidence: <span id="confPct" style="color:var(--buy)">84%</span></div>
        <div class="confidence-bar-wrap"><div id="confBar" class="confidence-bar" style="width:84%;background:var(--buy)"></div></div>
      </div>

      <div style="margin-top:8px;background:var(--bg3);border-radius:8px;padding:9px 10px;">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px">9-LAYER NEURAL CHECKLIST</div>
        <div id="signalChecks"></div>
        
        <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:10px;color:var(--muted)">Whale Conviction Score</div>
          <div id="whaleScore" style="font-size:16px;font-weight:800;color:var(--whale)">9.2</div>
        </div>
      </div>
    </div>

    <!-- Technical indicators (original) -->
    <div class="card">
      <div class="card-title">Technical indicators</div>
      <div class="ind-grid" id="indGrid"></div>
    </div>

    <!-- Market snapshot (original) -->
    <div class="card">
      <div class="card-title">Market snapshot</div>
      <div id="marketSnapshot"></div>
    </div>

  </div>

  <!-- MIDDLE COLUMN START -->
  <div class="col">

    <!-- Equity curve -->
    <div class="card">
      <div class="card-title">Equity curve (session)</div>
      <canvas id="equityChart" width="620" height="160"></canvas>
    </div>

    <!-- Live trade log -->
    <div class="card">
      <div class="card-title">Live trade log</div>
      <div id="tradeLog"></div>
    </div>

<!-- END OF PART 1 -->
